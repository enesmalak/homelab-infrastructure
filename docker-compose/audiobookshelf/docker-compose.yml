services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    restart: unless-stopped
    ports:
      - "13378:80"
    volumes:
      - ./config:/config
      - ./metadata:/metadata
      # Media folders from RAID array
      - /mnt/raid5/MEDIA/audiobooks:/audiobooks
      - /mnt/raid5/MEDIA/podcasts:/podcasts
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Europe/Berlin
